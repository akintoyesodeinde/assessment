spring.application.name=test
server.port=9090

# H2 DB config
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA config
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Enable H2 console
#spring.h2.console.enabled=${APP_H2_CONSOLE_ENABLED:false}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep ORM logs production-safe by default
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# JWT configuration
app.security.jwt.secret=${APP_JWT_SECRET:change-this-secret-in-prod-to-a-minimum-32-byte-random-value-1234567890}
app.security.jwt.expiration-ms=3600000

# API rate limiting
app.security.rate-limit.login.max-requests=5
app.security.rate-limit.login.window-seconds=60
app.security.rate-limit.register.max-requests=5
app.security.rate-limit.register.window-seconds=300
app.security.rate-limit.transfer.max-requests=20
app.security.rate-limit.transfer.window-seconds=60

# Server error response hardening
server.error.include-stacktrace=never
server.error.include-message=never
