<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Login</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="auth-shell">
    <section class="card">
        <h1>Wallet Login</h1>
        <p class="muted">Sign in to access your wallet dashboard.</p>

        <div th:if="${param.error}" class="alert alert-error">Invalid email or password.</div>
        <div th:if="${param.logout}" class="alert">You have logged out.</div>
        <div th:if="${param.registered}" class="alert">Registration complete. Please sign in.</div>
        <div th:if="${successMessage}" class="alert" th:text="${successMessage}"></div>

        <form th:action="@{/login}" method="post" class="form-grid">
            <label for="username">Email</label>
            <input id="username" name="username" type="email" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>

            <button type="submit">Login</button>
        </form>

        <p class="footnote">No account yet? <a th:href="@{/register}">Register</a></p>
    </section>
</main>
</body>
</html>
